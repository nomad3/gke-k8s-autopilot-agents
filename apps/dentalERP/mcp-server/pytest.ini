[pytest]
# Pytest configuration for MCP Server

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ensure src package is importable when running pytest without installing the
# project as a package. This mirrors ``PYTHONPATH=src`` conventionally used for
# src-layout repositories and prevents ``ModuleNotFoundError`` during
# collection when ``pytest`` is executed from the repository root.
pythonpath = src

# Test markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require external services)
    e2e: End-to-end tests (complete workflow)
    slow: Slow tests (> 1 second)

# Async support
asyncio_mode = auto

# Output
addopts =
    -v
    --strict-markers
    --tb=short

# Coverage configuration is retained below for developers who opt-in via
# explicit CLI flags, but the default invocation no longer requires the
# optional ``pytest-cov`` plugin. This keeps ``pytest`` runnable in
# constrained environments (like CI containers) without extra packages.

# Coverage
[coverage:run]
source = src
omit =
    */tests/*
    */conftest.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

