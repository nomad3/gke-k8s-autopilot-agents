# MCP Server Helm values for DentalERP
serviceName: mcp-server
namespace: mcp
image:
  repository: gcr.io/ai-agency-479516/mcp-server
  tag: "dev-latest"
  pullPolicy: Always
replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi
service:
  type: ClusterIP
  port: 80
  targetPort: 8085
secret:
  enabled: false
  externalSecret:
    enabled: false

extraEnvFrom:
  - secretRef:
      name: mcp-secrets
  - secretRef:
      name: snowflake-credentials
  - secretRef:
      name: openai-secrets
  - secretRef:
      name: netsuite-secrets

extraVolumes:
  - name: snowflake-key-volume
    secret:
      secretName: snowflake-credentials
      items:
        - key: snowflake_private_key.p8
          path: snowflake_private_key.p8

extraVolumeMounts:
  - name: snowflake-key-volume
    mountPath: "/etc/snowflake"
    readOnly: true

# Override configMap to set the key path
configMap:
  enabled: true
  data:
    ENVIRONMENT: production
    PORT: "8085"
    POSTGRES_HOST: "postgres-instance-ip-placeholder"
    REDIS_HOST: "redis-master.default.svc.cluster.local"
    REDIS_PORT: "6379"
    SNOWFLAKE_PRIVATE_KEY_PATH: "/etc/snowflake/snowflake_private_key.p8"

livenessProbe:
  httpGet:
    path: /health
    port: 8085
readinessProbe:
  httpGet:
    path: /health
    port: 8085
podLabels:
  app: mcp-server
  tier: backend
