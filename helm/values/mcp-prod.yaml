# MCP Server - Production Values
# Configuration for production environment

serviceName: mcp-server
namespace: mcp
environment: prod

image:
  repository: gcr.io/ai-agency-479516/mcp-server
  pullPolicy: Always
  tag: "dev-latest"  # Using dev image for now

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: "dev-backend-app@ai-agency-479516.iam.gserviceaccount.com"
  name: "prod-mcp-sa"

# Production replica count
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Production resources
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 8085

gateway:
  enabled: true
  gatewayName: external-gateway
  gatewayNamespace: gateway-system
  sectionName: https
  hostnames:
    - scdp-mcp-prod.agentprovision.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mcp-server
          port: 80

ingress:
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: 8085
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8085
  initialDelaySeconds: 10
  periodSeconds: 5

configMap:
  enabled: true
  data:
    ENVIRONMENT: "production"
    PORT: "8085"
    LOG_LEVEL: "info"
    NODE_ENV: "production"

secret:
  enabled: false  # Disable until secrets are configured in GCP Secret Manager

persistence:
  enabled: false

tmpVolumes:
  enabled: true
  volumes:
    - name: tmp
      mountPath: /tmp

podLabels:
  app: mcp-server
  tier: backend
  environment: prod

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Cloud SQL Proxy sidecar for database access
extraContainers:
  - name: cloud-sql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.2
    args:
      - "--private-ip"
      - "--structured-logs"
      - "--port=5432"
      - "ai-agency-479516:us-central1:dev-postgres-instance"
    securityContext:
      runAsNonRoot: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
