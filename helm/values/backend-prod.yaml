# Backend Service - Production Values
# Enhanced configuration for production environment

serviceName: backend
namespace: backend
environment: prod

image:
  repository: gcr.io/ai-agency-479516/backend
  pullPolicy: IfNotPresent
  tag: "dev-latest"  # Using dev image for now

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: "dev-backend-app@ai-agency-479516.iam.gserviceaccount.com"
  name: "dev-backend-sa"

# Higher replica count for production
replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3  # Higher minimum for production HA
  maxReplicas: 20  # Allow more scaling headroom
  targetCPUUtilizationPercentage: 65  # Scale earlier in prod
  targetMemoryUtilizationPercentage: 75

# Increased resources for production workload
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

gateway:
  enabled: true
  createGateway: true
  gatewayAnnotations:
    networking.gke.io/certmap: "agentprovision-certmap"
  gatewayName: external-gateway
  gatewayNamespace: gateway-system
  sectionName: https
  hostnames:
    - scdp-api-prod.agentprovision.com
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.agentprovision.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: placeholder-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/health
      filters:
        - type: URLRewrite
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: /health
      backendRefs:
        - name: backend
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 80

ingress:
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

configMap:
  enabled: true
  data:
    LOG_LEVEL: "warn"  # Less verbose in production
    API_VERSION: "v1"
    CORS_ORIGINS: "https://scdp-front-prod.agentprovision.com"
    DATABASE_HOST: "127.0.0.1"
    DATABASE_PORT: "5432"
    DATABASE_NAME: "app_db_prod"
    NODE_ENV: "production"
    PORT: "8080"

secret:
  enabled: true
  externalSecret:
    enabled: true
    secretStoreName: gcpsm-secret-store
    refreshInterval: 1h
    data:
      - secretKey: DATABASE_URL
        remoteRef:
          key: dev-database-url  # Using dev secrets on dev cluster
      - secretKey: DATABASE_PASSWORD
        remoteRef:
          key: dev-database-password
      - secretKey: JWT_SECRET
        remoteRef:
          key: dev-jwt-secret
      - secretKey: API_KEYS
        remoteRef:
          key: dev-api-keys
      - secretKey: JWT_REFRESH_SECRET
        remoteRef:
          key: dev-jwt-refresh-secret
      - secretKey: MCP_API_KEY
        remoteRef:
          key: dev-mcp-api-key

persistence:
  enabled: false

tmpVolumes:
  enabled: true
  volumes:
    - name: tmp
      mountPath: /tmp
    - name: cache
      mountPath: /app/cache

podLabels:
  app: backend
  tier: backend
  environment: prod

podDisruptionBudget:
  enabled: true
  minAvailable: 2  # Ensure at least 2 replicas during disruptions

# Cloud SQL Proxy sidecar for database access
extraContainers:
  - name: cloud-sql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.2
    args:
      - "--private-ip"
      - "--structured-logs"
      - "--port=5432"
      - "ai-agency-479516:us-central1:dev-postgres-instance"
    securityContext:
      runAsNonRoot: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
